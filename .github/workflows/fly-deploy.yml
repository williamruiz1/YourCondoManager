# Auto-deploy to Fly on every push to the default branch.
#
# WHY: per OP #31 (done = installed/deployed/usable on William's device, NOT
# PR merge), merged PRs that never reach production aren't done. Before this
# workflow, YCM merges accumulated on `main` while Fly stayed on a stale
# revision (last deploy 22h+ before this commit, with 25 PRs merged in
# window). Founder directive 2026-05-20 04:44.
#
# REQUIRES:
#   - repo secret `FLY_API_TOKEN` — deploy-scoped token, generated via
#     `fly tokens create deploy -a yourcondomanager`.
#   - repo secret `VITE_GOOGLE_MAPS_API_KEY` — the (rotated, HTTP-referrer +
#     API restricted) Google Maps JS key (A-SEC-002 / COST-B-004 / CQ-012).
#     Injected as a build-arg at deploy time so it is NOT committed to fly.toml.
#     Maps JS keys are client-visible by design; this is git-hygiene + rotation,
#     not server-secrecy. If the secret is unset the build passes with an empty
#     key (Maps just won't render) — it never fails the deploy.
#     Set it once: `gh secret set VITE_GOOGLE_MAPS_API_KEY -R williamruiz1/YourCondoManager`.

name: Deploy (Fly)

on:
  push:
    branches: [main]
  workflow_dispatch:

# cancel-in-progress MUST be false for deploys: with `true`, every new merge
# cancelled the RUNNING deploy — on 2026-07-03 FIVE consecutive deploys were
# cancelled this way and production sat >=5 merges stale (migrations included).
# `false` queues: the running deploy finishes, then the newest pending run
# lands (GitHub keeps only the latest pending run per group — deploys still
# coalesce, they just never get killed mid-flight).
concurrency:
  group: fly-deploy-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy app to Fly
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 20
    concurrency: deploy-group
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: superfly/flyctl-actions/setup-flyctl@ed8efb33836e8b2096c7fd3ba1c8afe303ebbff1 # master 2026-05-20
        with:
          version: latest

      - name: Deploy to Fly
        # --build-arg injects the Maps JS key from the CI secret (overrides the
        # empty fly.toml [build.args] default) so the value is never committed.
        run: flyctl deploy --remote-only --strategy immediate --build-arg VITE_GOOGLE_MAPS_API_KEY="${{ secrets.VITE_GOOGLE_MAPS_API_KEY }}"
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
