# Wave 30 — CI pipeline scaffold (Layer 5 module 5.9).
#
# Runs on every pull request targeting `main` and on every push to
# `main`. Four jobs, all gating merge:
#   - check     : tsc + eslint
#   - test      : vitest
#   - build     : production bundle (sanity)
#   - playwright: route-mock + real-backend + axe + visual regression
#
# The Playwright job runs the three Playwright modes sequentially in
# the same job because they share the npm + browser install. Failure
# uploads traces and the HTML report so the failure can be debugged
# without re-running the suite locally.

name: CI

on:
  pull_request:
    branches: [main]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  # founder-os#8337 R2 — cancel redundant PR runs (rapid pushes to the same PR
  # branch), but NEVER cancel a push-to-main run. All jobs share ONE self-hosted
  # runner and run serialized; the Playwright job (slowest, last) was being
  # cancelled mid-flight by the next main push before it could finish, so `main`
  # never reached a green CI run and EVERY PR was admin-merged past branch
  # protection (branch protection became theater). Letting a main run always
  # complete is what makes a green main CI run — R1 (docs-only PR all-green) and
  # R2 (green main run) — actually achievable.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# Migrated 2026-05-24 from `ubuntu-latest` (GitHub-hosted, METERED) to the
# mac-ycm self-hosted runner. Per founder-os perseverance-protocol.md Hard
# Boundary: no metered service may incur charges without William's explicit
# authorization. Self-hosted runs free on William's Mac.
#
# macOS-specific notes:
#  - `playwright install --with-deps` swapped to `playwright install` —
#    `--with-deps` only works on Debian/Ubuntu (uses apt). macOS has the
#    system libs already; only the browsers need installing.
#  - All other steps are runtime-portable (npm + node 24).

jobs:
  check:
    name: tsc + lint
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci --legacy-peer-deps
      - run: npm run check
      - run: npm run lint
      # founder-os#14743 — dues-vs-rent terminology guard: YCM charges HOA
      # dues/assessments, never "rent" (PlinthKeep is the rent product).
      - run: bash script/check-terminology.sh
      # CQ-001 (founder-os#10740): lint the server/shared trees (money/tenant/
      # webhook logic) that the client-only `lint` never touched. ADVISORY
      # (continue-on-error) for now — the initial finding count on 38.5k
      # untriaged lines is large; surface it without blocking merges, then
      # promote to a blocking gate once the backlog is triaged (do NOT
      # bulk-suppress). Type-aware rules: no-floating-promises + no-misused-promises.
      - run: npm run lint:server
        continue-on-error: true

  test:
    name: vitest
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci --legacy-peer-deps
      - run: npx vitest run

  build:
    name: build
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - name: Host compute admit + build lane (founder-os#15437)
        shell: bash
        run: |
          set -uo pipefail
          # Host-wide heavy-compute admission (founder-os#15437, follow-on to #15416).
          # 2026-07-23 load1=117.31 incident: the worker fleet + another repo's Xcode
          # build filled an 18-CPU Mac, then a product build started on top of it. A
          # heavy product build must defer until the host has real headroom AND hold
          # THE single build lane so two heavy product builds never overlap.
          # No-op on GitHub-hosted runners (helper absent -> fail-open).
          A="$HOME/.local/bin/founder-os/compute-admit.sh"
          if [ ! -x "$A" ]; then
            echo "::notice title=compute::compute-admit absent - proceeding (fail-open; GitHub-hosted runner)"
            exit 0
          fi
          echo "host budget: $("$A" check --class build 2>&1 || true)"
          # A REAL bounded wait is correct for a heavy build (unlike the cheap
          # founder-os validators' advisory stagger) - deferring a multi-minute build
          # is worth the latency. Fail-open on timeout: never block indefinitely.
          "$A" wait --class build --timeout 600 \
            || echo "::warning title=compute::load wait timed out (600s) - proceeding (fail-open)"
          # Hold THE single product build lane. Bounded acquire (~5 min), then proceed
          # fail-open; leaked leases auto-expire via TTL so there is no deadlock.
          for i in $(seq 1 20); do
            R="$("$A" lease ycm-build --ttl 3600 2>&1 || true)"
            case "$R" in
              LEASED:*|ALREADY-HELD:*) echo "build lane acquired: $R"; break ;;
              *) echo "::notice title=compute::build lane $R - retry $i/20"; sleep 15 ;;
            esac
          done
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci --legacy-peer-deps
      - run: npm run build

      - name: Release host compute build lane (founder-os#15437)
        if: always()
        shell: bash
        run: |
          A="$HOME/.local/bin/founder-os/compute-admit.sh"
          [ -x "$A" ] && "$A" release ycm-build || true
  playwright:
    name: Playwright (route-mock + real-backend + axe + visual)
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    env:
      # NOT 5000 (founder-os#8337 root cause): on the self-hosted macOS runner,
      # macOS AirPlay Receiver (the ControlCenter process) permanently LISTENS
      # on port 5000 — so every webServer bind failed with "already used" on
      # every run, including docs-only commits. Worse, the free-port step below
      # was kill -9'ing ControlCenter each run (same user → kill succeeds;
      # launchd respawns it and re-binds 5000, so the failure persisted anyway).
      # 5013 is unclaimed on the runner (lsof-probed 2026-07-02); the config +
      # server are fully parameterized so nothing else changes.
      PLAYWRIGHT_PORT: "5013"
    steps:
      - name: Host compute admit + build lane (founder-os#15437)
        shell: bash
        run: |
          set -uo pipefail
          # Host-wide heavy-compute admission (founder-os#15437, follow-on to #15416).
          # 2026-07-23 load1=117.31 incident: the worker fleet + another repo's Xcode
          # build filled an 18-CPU Mac, then a product build started on top of it. A
          # heavy product build must defer until the host has real headroom AND hold
          # THE single build lane so two heavy product builds never overlap.
          # No-op on GitHub-hosted runners (helper absent -> fail-open).
          A="$HOME/.local/bin/founder-os/compute-admit.sh"
          if [ ! -x "$A" ]; then
            echo "::notice title=compute::compute-admit absent - proceeding (fail-open; GitHub-hosted runner)"
            exit 0
          fi
          echo "host budget: $("$A" check --class build 2>&1 || true)"
          # A REAL bounded wait is correct for a heavy build (unlike the cheap
          # founder-os validators' advisory stagger) - deferring a multi-minute build
          # is worth the latency. Fail-open on timeout: never block indefinitely.
          "$A" wait --class build --timeout 600 \
            || echo "::warning title=compute::load wait timed out (600s) - proceeding (fail-open)"
          # Hold THE single product build lane. Bounded acquire (~5 min), then proceed
          # fail-open; leaked leases auto-expire via TTL so there is no deadlock.
          for i in $(seq 1 20); do
            R="$("$A" lease ycm-playwright --ttl 3600 2>&1 || true)"
            case "$R" in
              LEASED:*|ALREADY-HELD:*) echo "build lane acquired: $R"; break ;;
              *) echo "::notice title=compute::build lane $R - retry $i/20"; sleep 15 ;;
            esac
          done
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci --legacy-peer-deps
      # founder-os#10172 — cache the Playwright browsers so the Chrome-for-Testing
      # CDN (storage.googleapis.com) is hit ONCE per Playwright version, then never
      # again. This COMPLEMENTS #10095's retry-wrapper: the retry self-heals a
      # transient CDN blip; this cache means a CDN HARD-down can't block CI at all
      # after the first successful install for a given version (the install step
      # below becomes a fast no-op on a cache hit). Keyed on the RESOLVED
      # @playwright/test version so a version bump correctly re-fetches. The macOS
      # browser cache lives at ~/Library/Caches/ms-playwright (NOT ~/.cache/ms-playwright
      # — that's the Linux default). Reversible (git-revert), no new secrets.
      - name: Resolve Playwright version (cache key)
        id: pw-version
        run: echo "version=$(npx playwright --version | sed 's/^Version //')" >> "$GITHUB_OUTPUT"
      - name: Cache Playwright browsers
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/Library/Caches/ms-playwright
          key: ms-playwright-${{ runner.os }}-${{ steps.pw-version.outputs.version }}
          restore-keys: |
            ms-playwright-${{ runner.os }}-
      # `--with-deps` is Debian/Ubuntu only (uses apt-get). macOS has the
      # system libs already; install browsers only.
      #
      # founder-os#10095 — bounded retry with exponential backoff. The browser
      # download from Google's Chrome-for-Testing CDN (storage.googleapis.com)
      # intermittently times out (ETIMEDOUT / socket hang up) from the
      # self-hosted runner, which never reaches a test and BLOCKED every YCM PR
      # merge (proven on PR #423, 3× on this same step). A transient CDN blip now
      # self-heals instead of failing the required check. `playwright install` is
      # idempotent — a retry re-uses already-downloaded browsers and only
      # re-fetches the ones still missing. All 3 browsers stay (chromium/firefox/
      # webkit are intentional cross-browser projects, playwright.config Wave 45).
      - name: Install Playwright browsers (retry on CDN flake)
        run: |
          set -o pipefail
          attempts=5
          delay=10
          for i in $(seq 1 "$attempts"); do
            echo "::group::playwright install (attempt $i/$attempts)"
            if npx playwright install chromium firefox webkit; then
              echo "::endgroup::"
              echo "Playwright browsers installed on attempt $i."
              exit 0
            fi
            echo "::endgroup::"
            if [ "$i" -lt "$attempts" ]; then
              echo "Install failed (likely CDN timeout) — retrying in ${delay}s…"
              sleep "$delay"
              delay=$(( delay * 2 ))
            fi
          done
          echo "Playwright browser install failed after ${attempts} attempts." >&2
          exit 1
      # Self-hosted-runner hygiene: the Playwright webServer binds
      # PLAYWRIGHT_PORT (5013 — see the job env above for why NOT 5000), and
      # `reuseExistingServer` is FALSE in CI — so a stale webServer left by a
      # previously CANCELLED run (the workflow uses `cancel-in-progress: true`)
      # would make Playwright fail with "already used". Free the port before
      # starting. Safe on 5013: only a stale test webServer can hold it (unlike
      # 5000, where this step was killing macOS ControlCenter). Idempotent +
      # never fails the job (no listener = lsof prints nothing → `|| true`).
      - name: Free the Playwright port (stale webServer from a cancelled run)
        run: |
          PORT="${PLAYWRIGHT_PORT:-5013}"
          PIDS="$(lsof -ti tcp:"$PORT" || true)"
          if [ -n "$PIDS" ]; then
            echo "Killing stale process(es) on port $PORT: $PIDS"
            # shellcheck disable=SC2086
            kill -9 $PIDS || true
            sleep 1
          else
            echo "Port $PORT is free."
          fi
      - name: Playwright (route-mock — excludes @visual)
        run: npx playwright test --grep-invert @visual
        env:
          PLAYWRIGHT_STATIC: "1"
      - name: Playwright (real-backend — excludes @visual)
        run: npx playwright test --grep-invert @visual
        env:
          PLAYWRIGHT_REAL_BACKEND: "1"
      - name: Playwright (visual regression)
        # Visual baselines are committed as macOS-rendered PNGs (Wave 25).
        # CI runs Linux which has different font rendering / antialiasing,
        # so visual snapshots will not match without per-platform baselines.
        # Run the job non-blocking until baselines are regenerated on Linux
        # (planned follow-up). Static-server mode used here so we don't
        # require DATABASE_URL (the visual specs don't exercise the DB).
        if: ${{ !cancelled() }}
        continue-on-error: true
        env:
          PLAYWRIGHT_STATIC: "1"
        run: npm run test:playwright:visual
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: |
            test-results/
            playwright-report/
          retention-days: 7
      - name: Release host compute build lane (founder-os#15437)
        if: always()
        shell: bash
        run: |
          A="$HOME/.local/bin/founder-os/compute-admit.sh"
          [ -x "$A" ] && "$A" release ycm-playwright || true
