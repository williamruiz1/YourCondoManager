# Wave 30 — CI pipeline scaffold (Layer 5 module 5.9).
#
# Runs on every pull request targeting `main` and on every push to
# `main`. Four gating jobs, all required by branch protection:
#   - check     : tsc + eslint
#   - test      : vitest
#   - build     : production bundle (sanity)
#   - playwright: route-mock + real-backend + axe + visual regression
#
# The Playwright job runs the three Playwright modes sequentially in
# the same job because they share the npm + browser install. Failure
# uploads traces and the HTML report so the failure can be debugged
# without re-running the suite locally.
#
# founder-os#10824 — docs-only PRs must stay mergeable.
#   The trigger MUST NOT `paths-ignore` docs, because branch protection
#   requires the 4 job contexts above: if the whole workflow is filtered
#   out on a docs-only PR, those required contexts NEVER report and the PR
#   is permanently stuck on "Expected — waiting for status" (unbypassable
#   even by --admin). Instead the workflow ALWAYS runs, a `changes` job
#   detects docs-only PRs, and each gating job short-circuits its expensive
#   steps to report SUCCESS in seconds. This is fail-safe: any uncertainty
#   in detection (empty diff, non-PR event, fetch failure) defaults to
#   run_full=true, so a real code PR can never skip its checks.

name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Migrated 2026-05-24 from `ubuntu-latest` (GitHub-hosted, METERED) to the
# mac-ycm self-hosted runner. Per founder-os perseverance-protocol.md Hard
# Boundary: no metered service may incur charges without William's explicit
# authorization. Self-hosted runs free on William's Mac.
#
# macOS-specific notes:
#  - `playwright install --with-deps` swapped to `playwright install` —
#    `--with-deps` only works on Debian/Ubuntu (uses apt). macOS has the
#    system libs already; only the browsers need installing.
#  - All other steps are runtime-portable (npm + node 24).

jobs:
  # Detect docs-only PRs so the gating jobs below can short-circuit their
  # expensive steps while still REPORTING their required status contexts.
  # Fail-safe: any non-PR event, empty/undeterminable diff, or fetch failure
  # yields run_full=true -> the real checks run. A gating job's expensive
  # steps skip ONLY on a confirmed docs-only PR.
  changes:
    name: detect docs-only
    runs-on: [self-hosted, macOS, ARM64]
    outputs:
      run_full: ${{ steps.detect.outputs.run_full }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - id: detect
        shell: bash
        run: |
          set -euo pipefail
          # Non-PR events (push to main, etc.) always run the full CI.
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "not a pull_request event -> run_full=true"
            echo "run_full=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          BASE_REF='${{ github.base_ref }}'
          git fetch --no-tags --depth=1 origin "$BASE_REF" 2>/dev/null || true
          CHANGED="$(git diff --name-only "origin/${BASE_REF}...HEAD" 2>/dev/null || true)"
          if [ -z "$CHANGED" ]; then
            # Could not determine the changed set -> fail safe to full CI.
            echo "changed set undeterminable -> run_full=true (fail-safe)"
            echo "run_full=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "changed files:"
          printf '%s\n' "$CHANGED"
          # code = ANY changed file that is not *.md and not under docs/.
          if printf '%s\n' "$CHANGED" | grep -vE '(\.md$|^docs/)' | grep -q .; then
            echo "non-docs changes present -> run_full=true"
            echo "run_full=true" >> "$GITHUB_OUTPUT"
          else
            echo "docs-only PR -> run_full=false (gating jobs report success)"
            echo "run_full=false" >> "$GITHUB_OUTPUT"
          fi

  check:
    name: tsc + lint
    needs: changes
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - if: needs.changes.outputs.run_full == 'true'
        run: npm ci --legacy-peer-deps
      - if: needs.changes.outputs.run_full == 'true'
        run: npm run check
      - if: needs.changes.outputs.run_full == 'true'
        run: npm run lint
      - if: needs.changes.outputs.run_full != 'true'
        run: echo "docs-only PR — tsc + lint not applicable; reporting success (founder-os#10824)"

  test:
    name: vitest
    needs: changes
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - if: needs.changes.outputs.run_full == 'true'
        run: npm ci --legacy-peer-deps
      - if: needs.changes.outputs.run_full == 'true'
        run: npx vitest run
      - if: needs.changes.outputs.run_full != 'true'
        run: echo "docs-only PR — vitest not applicable; reporting success (founder-os#10824)"

  build:
    name: build
    needs: changes
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - if: needs.changes.outputs.run_full == 'true'
        run: npm ci --legacy-peer-deps
      - if: needs.changes.outputs.run_full == 'true'
        run: npm run build
      - if: needs.changes.outputs.run_full != 'true'
        run: echo "docs-only PR — build not applicable; reporting success (founder-os#10824)"

  playwright:
    name: Playwright (route-mock + real-backend + axe + visual)
    needs: changes
    runs-on: [self-hosted, macOS, ARM64]
    timeout-minutes: 30
    steps:
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - if: needs.changes.outputs.run_full == 'true'
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
          cache: "npm"
      - if: needs.changes.outputs.run_full == 'true'
        run: npm ci --legacy-peer-deps
      # `--with-deps` is Debian/Ubuntu only (uses apt-get). macOS has the
      # system libs already; install browsers only.
      - if: needs.changes.outputs.run_full == 'true'
        run: npx playwright install chromium firefox webkit
      - name: Playwright (route-mock — excludes @visual)
        if: needs.changes.outputs.run_full == 'true'
        run: npx playwright test --grep-invert @visual
        env:
          PLAYWRIGHT_STATIC: "1"
      - name: Playwright (real-backend — excludes @visual)
        if: needs.changes.outputs.run_full == 'true'
        run: npx playwright test --grep-invert @visual
        env:
          PLAYWRIGHT_REAL_BACKEND: "1"
      - name: Playwright (visual regression)
        # Visual baselines are committed as macOS-rendered PNGs (Wave 25).
        # CI runs Linux which has different font rendering / antialiasing,
        # so visual snapshots will not match without per-platform baselines.
        # Run the job non-blocking until baselines are regenerated on Linux
        # (planned follow-up). Static-server mode used here so we don't
        # require DATABASE_URL (the visual specs don't exercise the DB).
        if: ${{ needs.changes.outputs.run_full == 'true' && !cancelled() }}
        continue-on-error: true
        env:
          PLAYWRIGHT_STATIC: "1"
        run: npm run test:playwright:visual
      - name: Upload Playwright artifacts
        if: failure()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: playwright-traces
          path: |
            test-results/
            playwright-report/
          retention-days: 7
      - name: Report success for docs-only PR
        if: needs.changes.outputs.run_full != 'true'
        run: echo "docs-only PR — Playwright not applicable; reporting success (founder-os#10824)"
