# Security gate — additive to ci.yml.
# Runs on every PR targeting main; fails on HIGH + CRITICAL CVEs (founder-os#10740
# CQ-003 — was critical-only, so a High auth-bypass/RCE could merge + auto-deploy).
# Pre-existing/triaged high advisories are excepted via .github/npm-audit-allowlist.txt
# (a package listed there does not fail the gate). Moderate stays a PR label only.
#
# Spec: docs/specs/security-maturity-roadmap-2026-05-10.md (Workstream 1)

name: Security

on:
  pull_request:
    branches: [main]

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write

jobs:
  audit:
    # Migrated 2026-05-24 to self-hosted runner. No metered services without
    # William's authorization (perseverance-protocol.md Hard Boundary).
    name: security gate (npm audit + tsc)
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: "24"
      - run: npm ci

      - name: TypeScript strict check
        run: npx tsc --noEmit

      - name: npm audit + severity label
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          set -uo pipefail

          AUDIT=$(npm audit --json || true)
          CRIT=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.critical // 0')
          HIGH=$(echo "$AUDIT" | jq '.metadata.vulnerabilities.high // 0')
          MOD=$(echo "$AUDIT"  | jq '.metadata.vulnerabilities.moderate // 0')
          echo "::notice::npm audit — critical=$CRIT high=$HIGH moderate=$MOD"

          # CQ-003 — the set of high advisories whose package is NOT allowlisted.
          # These are what actually fail the gate (critical always fails).
          ALLOW=$(grep -vE '^\s*#|^\s*$' .github/npm-audit-allowlist.txt 2>/dev/null | tr -d '\r' | jq -R . | jq -s . )
          EFFECTIVE_HIGH=$(echo "$AUDIT" | jq --argjson allow "${ALLOW:-[]}" '
            [ (.vulnerabilities // {}) | to_entries[]
              | select(.value.severity=="high")
              | select(.key as $k | ($allow | index($k)) | not) ] | length')
          echo "::notice::CQ-003 gate — critical=$CRIT effective-high=$EFFECTIVE_HIGH (allowlisted-high excepted)"

          # Ensure severity labels exist (idempotent, force-updates color/desc).
          gh label create "security: critical-vulns" --color "B60205" --description "Critical CVEs detected by security workflow" --force >/dev/null 2>&1 || true
          gh label create "security: high-vulns"     --color "D93F0B" --description "High-severity CVEs detected by security workflow" --force >/dev/null 2>&1 || true
          gh label create "security: moderate-vulns" --color "FBCA04" --description "Moderate-severity CVEs detected by security workflow" --force >/dev/null 2>&1 || true

          # Clear any stale severity labels — re-apply only the maximal one below.
          gh pr edit "$PR_NUMBER" --remove-label "security: critical-vulns" 2>/dev/null || true
          gh pr edit "$PR_NUMBER" --remove-label "security: high-vulns"     2>/dev/null || true
          gh pr edit "$PR_NUMBER" --remove-label "security: moderate-vulns" 2>/dev/null || true

          if [ "$CRIT" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --add-label "security: critical-vulns"
          elif [ "$HIGH" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --add-label "security: high-vulns"
          elif [ "$MOD" -gt 0 ]; then
            gh pr edit "$PR_NUMBER" --add-label "security: moderate-vulns"
          else
            echo "No moderate-or-above vulnerabilities found; no severity label applied."
          fi

          if [ "$CRIT" -gt 0 ] || [ "$EFFECTIVE_HIGH" -gt 0 ]; then
            echo "::error::security gate failed — $CRIT critical + $EFFECTIVE_HIGH non-allowlisted high CVE(s). Fix the dependency, or (if genuinely accepted) add its package to .github/npm-audit-allowlist.txt with a dated reason."
            exit 1
          fi
