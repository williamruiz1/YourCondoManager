app = "yourcondomanager"
primary_region = "ewr"

[build]
  [build.args]
    VITE_GOOGLE_MAPS_API_KEY = "AIzaSyCsb1tCLccLzdaKgCm4263A32S0Z0LvdR8"
    # Observability (Issue founder-os#1030) — set both values when the YCM
    # Sentry org + GA4 property are provisioned. Build-time inlines them
    # into the client bundle. Server-side `SENTRY_DSN` lives in Fly secrets
    # (NOT here). See INSTALL-OBSERVABILITY.md for the runbook.
    VITE_SENTRY_DSN = ""
    VITE_GA_MEASUREMENT_ID = ""
    VITE_APP_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 150

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  APP_BASE_URL = "https://app.yourcondomanager.org"
