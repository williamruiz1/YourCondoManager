app = "yourcondomanager"
primary_region = "ewr"

# founder-os #2476 — Drizzle migration runner.
#
# Fly's `release_command` runs once per deploy on a dedicated short-lived
# machine BEFORE the app machines come up. If it exits non-zero the entire
# deploy aborts (the app machines never roll forward). This is the canonical
# fix for the silent-skip class of failure where `drizzle-kit push` was only
# ever invoked by hand (SIX migrations missed production over several deploys
# before this landed).
#
# scripts/migrate.cjs is CommonJS so it runs on the slimmed production image
# (the runner Dockerfile stage does `npm ci --omit=dev`, which removes tsx /
# drizzle-kit / typescript — but drizzle-orm and pg are runtime deps and stay
# in the image). The Dockerfile also copies `migrations/` and `scripts/` into
# the runner stage so the journal + SQL files are available at deploy time.
#
# To run by hand:
#   flyctl ssh console -a yourcondomanager -C 'cd /app && npm run migrate'
#
# To run the one-shot backfill (ONCE, before first auto-run after merge):
#   flyctl ssh console -a yourcondomanager \
#     -C 'cd /app && node scripts/backfill-migration-journal.cjs'
#
# See scripts/migrate.cjs and scripts/backfill-migration-journal.cjs.
[deploy]
  release_command = "node scripts/migrate.cjs"

[build]
  [build.args]
    # Google Maps JS key (founder-os audit A-SEC-002 / COST-B-004 / CQ-012).
    # This is a VITE_-prefixed key: it is client-visible by design (Maps JS
    # keys must be inlined into the browser bundle) — the protection is
    # HTTP-referrer + API restriction in Google Cloud Console, NOT secrecy.
    # It is intentionally EMPTY here so no live key is committed to git.
    # The CI deploy (.github/workflows/fly-deploy.yml) injects the real value
    # at build time via `--build-arg` from the repo secret
    # `VITE_GOOGLE_MAPS_API_KEY`, so rotating the key never requires a commit
    # and the value never accumulates in git history. maps-loader.ts degrades
    # gracefully (no map UI) when the value is empty, so a manual/local
    # `flyctl deploy` without the build-arg is safe.
    VITE_GOOGLE_MAPS_API_KEY = ""
    # Observability (Issue founder-os#1030; A-OPS-003 / CQ-009). The SDKs are
    # now in package.json — set VITE_SENTRY_DSN here (build-time, inlined into
    # the client bundle) and the server-side `SENTRY_DSN` Fly secret to actually
    # capture. Both are empty today → Sentry safely no-ops. Set SENTRY_STRICT=1
    # once the DSN is provisioned to make a future missing DSN hard-fail the boot.
    # See INSTALL-OBSERVABILITY.md for the runbook (residual human steps).
    VITE_SENTRY_DSN = ""
    VITE_GA_MEASUREMENT_ID = ""
    VITE_APP_ENV = "production"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 150

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  APP_BASE_URL = "https://app.yourcondomanager.org"
  # Neon usage RCA (2026-07-14): server/index.ts's automation sweep
  # (autopay, notices, board packages, bank-feed sync, etc.) defaults to
  # 300_000ms (5 min) if this isn't set. Each tick opens a real Postgres
  # advisory-lock connection (withSchedulerLock) even when every
  # subsystem is a no-op that tick, and Neon autosuspends after ~5
  # continuous idle minutes with zero connections — a 5-minute poll sat
  # right on that boundary and effectively never let the DB suspend.
  # Bumping to 10 minutes gives a real idle window; every subsystem
  # inside the sweep already gates its own real-world cadence internally
  # (e.g. access-review reminder is ~85-day, onboarding reminder is
  # per-day), so this only changes how often the outer dispatcher wakes
  # up to check, not how promptly time-sensitive work actually fires.
  AUTOMATION_SWEEPS_INTERVAL_MS = "600000"
  # Durable uploads (#363/#379). Governing-doc uploads previously wrote to the
  # machine's ephemeral root fs (/app/uploads) and were destroyed on every
  # deploy / machine replacement. UPLOAD_DIR points them at the "ycm_uploads"
  # Fly volume mounted at /data (see [mounts]); server/routes.ts resolves the
  # single `uploadDir` from this, so all upload writes + the serve route land
  # on the persistent volume.
  UPLOAD_DIR = "/data/uploads"

# Persistent volume for uploaded governing documents (#363/#379). A Fly volume
# binds to ONE machine and does NOT replicate across machines, so uploads must
# be served from a single machine. This app is run single-machine (min=1,
# auto_stop) — `fly scale count 1` pins it. For future multi-machine scale-out,
# migrate to shared object storage (Tigris/S3) — the code path is env-driven so
# only the storage adapter changes. Create the volume before first deploy:
#   flyctl volumes create ycm_uploads --app yourcondomanager --region ewr --size 3
[mounts]
  source = "ycm_uploads"
  destination = "/data"
