# fly.staging.toml — YourCondoManager STAGING review environment (founder-os#10193 F0)
#
# A separate Fly app that runs the REDESIGN branch against a CLONED + ISOLATED
# copy of the real Cherry Hill Court production data, so William can review the
# redesign on realistic records BEFORE anything ships to the live app.
#
# SAFETY — this app must never act on the real world:
#   * OUTBOUND_SIDE_EFFECTS_DISABLED=1 / APP_ENV=staging  → email/SMS/push are
#     routed to a sink (server/staging-guard.ts) and LIVE Stripe keys are refused.
#   * DATABASE_URL is set (as a Fly secret) to the SEPARATE staging DB — a clone
#     of prod, NEVER the prod DB. Writes here never touch the prod books.
#   * Stripe runs in TEST mode only (PLATFORM_STRIPE_SECRET_KEY = sk_test_..., or
#     left unset so Stripe is "not configured").
#
# Deploy:  flyctl deploy -c fly.staging.toml -a yourcondomanager-staging
# Clone/refresh the DB:  scripts/refresh-staging-from-prod.sh   (see STAGING.md)

app = "yourcondomanager-staging"
primary_region = "ewr"

[deploy]
  # Same Drizzle migration runner as prod — staging DB gets the same schema.
  release_command = "node scripts/migrate.cjs"

[build]
  [build.args]
    # Injected at build time from the VITE_GOOGLE_MAPS_API_KEY CI secret
    # (founder-os#10743) — never committed. Mirrors prod fly.toml; the
    # no-committed-google-api-key guard test enforces this.
    VITE_GOOGLE_MAPS_API_KEY = ""
    VITE_SENTRY_DSN = ""
    VITE_GA_MEASUREMENT_ID = ""
    VITE_APP_ENV = "staging"

[http_service]
  internal_port = 5000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 1
  processes = ["app"]

[http_service.concurrency]
  type = "requests"
  hard_limit = 250
  soft_limit = 150

[[http_service.checks]]
  interval = "30s"
  timeout = "10s"
  grace_period = "20s"
  method = "GET"
  path = "/api/health"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"

# 2026-07-12 — the staging machines already had a `ycm_uploads` Fly volume
# attached (out-of-band, matching prod's fly.toml) but this config never
# declared it, so every deploy warned "volume mounted but app config does
# not specify a volume" and then hard-failed non-interactively ("yes flag
# must be specified when not running interactively") because flyctl refuses
# to proceed past that drift-warning without a live TTY confirm. Declaring
# the mount here (mirroring prod's [mounts] block) removes the drift and the
# confirmation prompt so `flyctl deploy --remote-only` works headless, same
# as prod.
[mounts]
  source = "ycm_uploads"
  destination = "/data"

[env]
  NODE_ENV = "production"
  PORT = "5000"
  APP_BASE_URL = "https://yourcondomanager-staging.fly.dev"
  # --- staging kill-switch (server/staging-guard.ts) ---
  APP_ENV = "staging"
  OUTBOUND_SIDE_EFFECTS_DISABLED = "1"
  YCM_STAGING = "1"
  # Mirrors prod's UPLOAD_DIR — writes land on the persistent `ycm_uploads`
  # volume instead of the machine's ephemeral local disk.
  UPLOAD_DIR = "/data/uploads"
