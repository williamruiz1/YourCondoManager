<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 420" role="img" aria-label="Your Condo Manager — mark clear-space and minimum-size reference">
  <title>Your Condo Manager — clear-space &amp; minimum-size reference</title>
  <!-- Clear-space unit X = the width of the narrowest (shortest) bar in the mark = 24 local units,
       scaled here 1.8x = 43.2 (rounded 43)px. No other logo, text, or graphic element should sit
       inside the dashed boundary on any side. -->
  <rect x="1" y="1" width="418" height="418" fill="none" stroke="#E5E7EB" stroke-width="2"/>
  <rect x="45" y="45" width="330" height="330" fill="none" stroke="#2DBDB0" stroke-width="2" stroke-dasharray="8 6"/>
  <g transform="translate(132,132) scale(1.8)" fill="#014D4A">
    <polygon points="10,88 34,70 34,112 10,112"/>
    <polygon points="46,58 70,40 70,112 46,112"/>
    <polygon points="82,26 106,8 106,112 82,112"/>
  </g>
  <!-- clear-space measurement callouts -->
  <line x1="45" y1="20" x2="45" y2="40" stroke="#0f2725" stroke-width="1.5"/>
  <line x1="1" y1="20" x2="45" y2="20" stroke="#0f2725" stroke-width="1.5" marker-end="url(#arrow)"/>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6 z" fill="#0f2725"/>
    </marker>
  </defs>
  <text x="8" y="15" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="700" fill="#0f2725">X</text>
  <text x="210" y="405" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#0f2725">Clear space = X on every side (X = narrowest bar width)</text>
  <text x="210" y="15" text-anchor="middle" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#5b716e">Minimum digital size: 24px  ·  Minimum print size: 0.25in</text>
</svg>
