  <rect x="698" y="418" width="38" height="38" fill="#F6F9FF"/>
  <rect x="734" y="418" width="38" height="38" fill="#F6F9FF"/>
  <rect x="808" y="418" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="418" width="38" height="38" fill="#F6F9FF"/>
  <!-- Row 2 (verticals of M) -->
  <rect x="698" y="474" width="38" height="38" fill="#F6F9FF"/>
  <rect x="734" y="474" width="38" height="38" fill="#F6F9FF"/>
  <rect x="808" y="474" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="474" width="38" height="38" fill="#F6F9FF"/>
  <!-- Row 3 (V apex of M) -->
  <rect x="698" y="530" width="38" height="38" fill="#F6F9FF"/>
  <rect x="772" y="530" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="530" width="38" height="38" fill="#F6F9FF"/>
  <!-- Row 4 (sides only) -->
  <rect x="698" y="586" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="586" width="38" height="38" fill="#F6F9FF"/>
  <!-- Row 5 (sides only) -->
  <rect x="698" y="642" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="642" width="38" height="38" fill="#F6F9FF"/>
  <!-- Row 6 (sides only) -->
  <rect x="698" y="698" width="38" height="38" fill="#F6F9FF"/>
  <rect x="845" y="698" width="38" height="38" fill="#F6F9FF"/>

  <!-- Unlit windows in M body (navy) -->
  <!-- Row 1 (center gap) -->
  <rect x="772" y="418" width="38" height="38" fill="#0B1B3B"/>
  <!-- Row 2 (center) -->
  <rect x="772" y="474" width="38" height="38" fill="#0B1B3B"/>
  <!-- Row 3 (between verticals and apex) -->
  <rect x="734" y="530" width="38" height="38" fill="#0B1B3B"/>
  <rect x="808" y="530" width="38" height="38" fill="#0B1B3B"/>
  <!-- Rows 4-6 (interior of M) -->
  <rect x="734" y="586" width="38" height="38" fill="#0B1B3B"/>
  <rect x="772" y="586" width="38" height="38" fill="#0B1B3B"/>
  <rect x="808" y="586" width="38" height="38" fill="#0B1B3B"/>
  <rect x="734" y="642" width="38" height="38" fill="#0B1B3B"/>
  <rect x="772" y="642" width="38" height="38" fill="#0B1B3B"/>
  <rect x="808" y="642" width="38" height="38" fill="#0B1B3B"/>
  <rect x="734" y="698" width="38" height="38" fill="#0B1B3B"/>
  <rect x="772" y="698" width="38" height="38" fill="#0B1B3B"/>
  <rect x="808" y="698" width="38" height="38" fill="#0B1B3B"/>
</svg>
